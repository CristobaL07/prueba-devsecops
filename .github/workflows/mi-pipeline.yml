name: Pipeline JavaScript
on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  testear-codigo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar test automatico
        run: node test.js
      - name: Escaneo de Seguridad Real (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'
      - name: Empaquetar aplicación lista para Producción (CD)
        uses: actions/upload-artifact@v4
        with:
          name: paquete-produccion
          path: app.js
